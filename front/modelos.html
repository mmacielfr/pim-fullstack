<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTM — Modelos disponíveis</title>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/modelos.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <header class="navbar">
        <nav class="nav-left nav-left--back-only">
            <a href="index.html" class="nav-back-home">← VOLTAR</a>
        </nav>

        <a href="index.html" class="nav-logo">
            <img src="images/logo-ktm.svg" alt="KTM" width="220" height="70">
        </a>

        <div class="nav-right">
            <a href="modelos.html" class="btn-login">ALUGUE JÁ</a>
        </div>
    </header>

    <section class="models" id="modelos">
        <h2 class="section-title">MODELOS DISPONÍVEIS</h2>

        <div class="model-grid">
            <article class="model-card">
                <div class="model-img">
                    <img src="images/Image%20(2).png" alt="Moto KTM Off-Road">
                </div>
                <h3 class="model-name">OFF-ROAD</h3>
                <a href="off-road.html" class="btn-cta btn-cta--small">Alugar moto</a>
            </article>

            <article class="model-card">
                <div class="model-img">
                    <img src="images/Image%20(3).png" alt="Moto KTM Naked Duke">
                </div>
                <h3 class="model-name">NAKED</h3>
                <a href="naked.html" class="btn-cta btn-cta--small">Alugar moto</a>
            </article>

            <article class="model-card">
                <div class="model-img">
                    <img src="images/Image%20(4).png" alt="Moto KTM Sport RC">
                </div>
                <h3 class="model-name">SPORT</h3>
                <a href="sport.html" class="btn-cta btn-cta--small">Alugar moto</a>
            </article>
        </div>
    </section>

    <footer class="footer footer-inicio">
        <p>Aluguel de motos</p>
        <div class="redes">
            <a href="#"><img src="images/icon-facebook.svg" alt="Facebook" width="20" height="20"></a>
            <a href="#"><img src="images/icon-linkedin.svg" alt="LinkedIn" width="20" height="20"></a>
            <a href="#"><img src="images/icon-youtube.svg" alt="YouTube" width="20" height="20"></a>
            <a href="#"><img src="images/icon-instagram.svg" alt="Instagram" width="20" height="20"></a>
        </div>
    </footer>

</body>
</html>
